# Run CI for R using https://eddelbuettel.github.io/r-ci/

name: ci

on:
  workflow_dispatch:
  push:
  pull_request:

env:
  _R_CHECK_FORCE_SUGGESTS_: "false"

jobs:
  ci:
    strategy:
      matrix:
        include:
          - {os: macOS-latest}
          - {os: ubuntu-latest}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: eddelbuettel/github-actions/r-ci@master

      - name: Setup ccache for R
        uses: eddelbuettel/github-actions/ccache-with-R@master
        with:
          key: ${{ matrix.os }}

      # - name: ccache overrides
      #   run: |
      #     ccache --set-config "base_dir=$(pwd)"
      #     ccache --set-config "cache_dir=$(pwd)/.ccache"
      #     ccache --set-config "sloppiness=include_file_ctime"
      #     ccache --set-config "hash_dir=false"
      #     ccache --show-config

      - name: Dependencies
        run: ./run.sh install_deps

      - name: Test
        run: ./run.sh run_tests

      #- name: Coverage
      #  if: ${{ matrix.os == 'ubuntu-latest' }}
      #  run: ./run.sh coverage
