# Run CI for R using https://eddelbuettel.github.io/r-ci/

name: ci

on:
  workflow_dispatch:
  push:
  pull_request:

env:
  _R_CHECK_FORCE_SUGGESTS_: "false"

jobs:
  ci:
    strategy:
      matrix:
        include:
          #- {os: macOS-latest}
          - {os: ubuntu-latest}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup
        uses: eddelbuettel/github-actions/r-ci@master

      - name: Setup ccache for R
        uses: eddelbuettel/github-actions/ccache-with-R@master
        with:
          key: ${{ matrix.os }}

      - name: Turn on ccache log
        run: |
          ccache --set-config "log_file=/tmp/ccache_log.txt"
          ccache --set-config "debug=true"
          ccache --verbose
          ccache --show-config

      - name: Dependencies
        run: ./run.sh install_deps

      - name: Test
        run: ./run.sh run_tests

      - name: Show ccache log
        run: cat /tmp/ccache_log.txt

      #- name: Coverage
      #  if: ${{ matrix.os == 'ubuntu-latest' }}
      #  run: ./run.sh coverage
