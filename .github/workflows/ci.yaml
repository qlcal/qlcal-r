# Run CI for R using https://eddelbuettel.github.io/r-ci/

name: ci

on:
  workflow_dispatch:
  push:
  pull_request:

env:
  _R_CHECK_FORCE_SUGGESTS_: "false"

jobs:
  ci:
    strategy:
      matrix:
        include:
          #- {os: macOS-latest}
          - {os: ubuntu-latest}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: eddelbuettel/github-actions/r-ci@master

      - name: Setup ccache for R
        uses: eddelbuettel/github-actions/ccache-with-R@master

      - name: Dependencies
        run: ./run.sh install_deps

      - name: ccache 1
        run: |
          ccache -z

      - name: Test
        run: ./run.sh run_tests

      - name: ccache 2
        run: |
          ccache -s
          ccache -z

      - name: Test again
        run: ./run.sh run_tests

      - name: ccache 3
        run: |
          ccache -s

      #- name: Coverage
      #  if: ${{ matrix.os == 'ubuntu-latest' }}
      #  run: ./run.sh coverage
